name: Release new version

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.7.0)"
        required: true
        type: string
      dry-run:
        description: "Dry run (skip actual publish)"
        required: false
        type: boolean
        default: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/ci

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set version
        run: npm version "${{ inputs.version }}"

      - name: Prepare dist for publishing
        run: |
          cp package.json dist/
          cp README.md dist/
          cp LICENSE.md dist/

      - name: Verify dist contents
        run: |
          echo "Contents of dist/:"
          ls -la dist/
          # Verify expected files exist
          for f in package.json README.md LICENSE.md heapify.js heapify.mjs heapify.d.ts; do
            if [ ! -f "dist/$f" ]; then
              echo "ERROR: expected file dist/$f not found"
              exit 1
            fi
          done
          echo "All expected files present."

      - name: Push commit and tag
        if: ${{ !inputs.dry-run }}
        run: git push origin HEAD "v${{ inputs.version }}"

      - name: Update version badge
        if: ${{ !inputs.dry-run }}
        uses: ./.github/actions/update-version-badge
