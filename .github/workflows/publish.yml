name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish (e.g. v0.7.0)"
        required: true
        type: string
      dry-run:
        description: "Dry run (skip actual publish)"
        required: false
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for OIDC
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - uses: ./.github/actions/ci
        with:
          registry-url: "https://registry.npmjs.org"

      - name: Prepare dist for publishing
        run: |
          cp package.json dist/
          cp README.md dist/
          cp LICENSE.md dist/

      - name: Verify dist contents
        run: |
          echo "Contents of dist/:"
          ls -la dist/
          # Verify expected files exist
          for f in package.json README.md LICENSE.md heapify.js heapify.mjs heapify.d.ts; do
            if [ ! -f "dist/$f" ]; then
              echo "ERROR: expected file dist/$f not found"
              exit 1
            fi
          done
          echo "All expected files present."

      - name: Print npm version (before update)
        run: npm --version

      # Ensure npm 11.5.1 or later for trusted publishing
      - name: Update npm
        run: npm install -g npm@latest

      - name: Publish (dry run)
        if: inputs.dry-run
        run: npm publish ./dist --dry-run

      - name: Publish
        if: ${{ !inputs.dry-run }}
        run: npm publish ./dist
