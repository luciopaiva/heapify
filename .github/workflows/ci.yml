
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/ci

      - name: Update coverage badge
        if: github.event_name == 'push' && env.ACT != 'true'
        uses: ./.github/actions/update-coverage-badge

      - name: Update coverage badge (skipped)
        if: github.event_name == 'push' && env.ACT == 'true'
        run: echo "Running locally via act – skipping coverage badge update"
        shell: bash

      - name: Update lines-of-code badge
        if: github.event_name == 'push' && env.ACT != 'true'
        uses: ./.github/actions/update-loc-badge

      - name: Update lines-of-code badge (skipped)
        if: github.event_name == 'push' && env.ACT == 'true'
        run: echo "Running locally via act – skipping lines-of-code badge update"
        shell: bash
